version: "3.9"

# ══════════════════════════════════════════════════════════
#  AI Knowledge Assistant — Docker Compose
#  Services:
#    endee   → Endee vector database (port 8080)
#    backend → FastAPI Python server (port 8000)
#
#  Usage:
#    docker compose up --build        # First run (builds backend image)
#    docker compose up -d             # Background
#    docker compose down              # Stop
#    docker compose down -v           # Stop + remove volumes
# ══════════════════════════════════════════════════════════

services:

  # ── Endee Vector Database ─────────────────────────────────
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000          # Endee needs high file-descriptor limits
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"
    environment:
      NDD_NUM_THREADS: 0      # 0 = auto-detect CPU threads
      NDD_AUTH_TOKEN: ""      # Leave empty for no authentication
    volumes:
      - endee-data:/data      # Persist vector data across restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledge-assistant-api
    ports:
      - "8000:8000"
    depends_on:
      endee:
        condition: service_healthy
    environment:
      # Point to the Endee container (Docker network DNS)
      ENDEE_HOST: "http://endee:8080"
      # LLM Configuration — override with your keys
      LLM_BACKEND: "${LLM_BACKEND:-openai}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-3.5-turbo}"
      HF_API_TOKEN: "${HF_API_TOKEN:-}"
      HF_MODEL_NAME: "${HF_MODEL_NAME:-HuggingFaceH4/zephyr-7b-beta}"
    volumes:
      # Hot-reload source changes (dev mode)
      - ./backend:/app
    restart: unless-stopped

volumes:
  endee-data:      # Named volume — survives container restarts
    driver: local
